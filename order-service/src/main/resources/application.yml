spring:
  application:
    name: order-service

  kafka:
    bootstrap-servers: ${HOST:localhost}:9092

  web:
    client:
      rest:
        connect-timeout: 5s
        read-timeout: 10s

server:
  port: 8081

app:
  kafka:
    topic: orders
    dlt-topic: orders.DLT
    partitions: 3
    replicas: 1

  data:
    service:
      url:
        api: http://${HOST:localhost}:8083/api/data

  retry:
    max-attempts: 3
    delay: 1000
    multiplier: 2
    max-interval: 10000

logging:
  level:
    com.github.seecret1.data: DEBUG
    com.github.seecret1.order_service: DEBUG
    com.github.seecret1.notification_service: DEBUG
